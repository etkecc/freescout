[www]
listen = /tmp/php-fpm.sock
listen.mode = 0660

pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

; Worker output -> master (which sinks to stderr via the global error_log).
catch_workers_output = yes
decorate_workers_output = no
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Inherit the container env so the Laravel vars exported by entrypoint.sh reach
; the workers (getenv()). Without this php-fpm scrubs the environment.
clear_env = no
